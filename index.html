<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadBunny — 英文精读解析</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#ffffff;
  --black:#0a0a0a;
  --gray-50:#fafafa;
  --gray-100:#f4f4f5;
  --gray-200:#e4e4e7;
  --gray-300:#d1d1d6;
  --gray-400:#a1a1aa;
  --gray-500:#71717a;
  --gray-700:#3f3f46;
  --gray-900:#18181b;
  --border:#e4e4e7;
  --radius:8px;
}

html{scroll-behavior:smooth}
body{
  background:var(--white);
  color:var(--black);
  font-family:'Geist',system-ui,sans-serif;
  font-size:14px;
  line-height:1.5;
  min-height:100vh;
}

/* ─── NAV ─── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
}
.nav-left{display:flex;align-items:center;gap:32px}
.nav-logo{
  display:flex;align-items:center;gap:8px;
  font-family:'Geist Mono',monospace;
  font-size:15px;font-weight:500;
  color:var(--black);text-decoration:none;
}
.nav-logo img{width:24px;height:24px;object-fit:contain}
.nav-links{display:flex;gap:20px}
.nav-links a{
  color:var(--gray-500);text-decoration:none;
  font-size:13px;transition:color .15s;
}
.nav-links a:hover{color:var(--black)}
.nav-right{display:flex;align-items:center;gap:10px}
.btn-ghost{
  padding:6px 14px;border:1px solid var(--border);
  border-radius:var(--radius);background:transparent;
  color:var(--gray-700);font-size:13px;
  cursor:pointer;transition:background .15s,border-color .15s;
  font-family:'Geist',sans-serif;text-decoration:none;
}
.btn-ghost:hover{background:var(--gray-50);border-color:var(--gray-300)}
.btn-solid{
  padding:6px 14px;background:var(--black);
  border:1px solid var(--black);border-radius:var(--radius);
  color:white;font-size:13px;
  cursor:pointer;transition:opacity .15s;
  font-family:'Geist',sans-serif;text-decoration:none;
}
.btn-solid:hover{opacity:.85}

/* ─── HERO ─── */
.hero{
  padding-top:52px;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:0;
  border-bottom:1px solid var(--border);
}
.hero-inner{
  max-width:900px;width:100%;
  padding:80px 24px 60px;
  text-align:center;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Geist Mono',monospace;font-size:11px;
  color:var(--gray-500);letter-spacing:.08em;text-transform:uppercase;
  border:1px solid var(--border);border-radius:100px;
  padding:4px 12px;margin-bottom:32px;
}
.hero-eyebrow-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--black);
}
.hero h1{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:clamp(2.8rem,6vw,4.5rem);
  font-weight:400;line-height:1.1;
  color:var(--black);letter-spacing:-.02em;
  margin-bottom:20px;
}
.hero h1 em{font-style:italic}
.hero-sub{
  font-size:15px;color:var(--gray-500);
  max-width:480px;margin:0 auto 40px;line-height:1.65;
}

/* ─── BUNNY IMAGE ─── */
.hero-image{
  width:220px;height:220px;
  margin:0 auto 48px;
  display:flex;align-items:center;justify-content:center;
}
.hero-image img{
  width:100%;height:100%;
  object-fit:contain;
}

/* ─── INPUT AREA ─── */
.input-wrap{
  max-width:680px;margin:0 auto;
  border:1px solid var(--border);border-radius:12px;
  overflow:hidden;background:var(--white);
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
}
.input-tabs{
  display:flex;border-bottom:1px solid var(--border);
  background:var(--gray-50);
}
.tab{
  flex:1;padding:10px 16px;
  border:none;background:transparent;
  font-family:'Geist',sans-serif;font-size:12px;
  color:var(--gray-500);cursor:pointer;
  transition:color .15s;border-bottom:2px solid transparent;
  margin-bottom:-1px;
}
.tab.active{color:var(--black);border-bottom-color:var(--black);background:var(--white)}
.tab:hover:not(.active){color:var(--gray-700)}
.pane{display:none;padding:16px}
.pane.active{display:block}
textarea{
  width:100%;min-height:120px;
  border:1px solid var(--border);border-radius:6px;
  padding:12px;font-family:'Geist Mono',monospace;font-size:12.5px;
  color:var(--black);background:var(--white);
  resize:vertical;outline:none;line-height:1.7;
  transition:border-color .15s;
}
textarea:focus{border-color:var(--gray-400)}
textarea::placeholder{color:var(--gray-400)}
.url-row{display:flex;gap:8px}
input[type=url]{
  flex:1;border:1px solid var(--border);border-radius:6px;
  padding:10px 12px;font-family:'Geist Mono',monospace;font-size:12.5px;
  color:var(--black);background:var(--white);outline:none;
  transition:border-color .15s;
}
input[type=url]:focus{border-color:var(--gray-400)}
input[type=url]::placeholder{color:var(--gray-400)}
.opts{
  display:flex;align-items:center;gap:6px;
  padding:10px 16px;border-top:1px solid var(--border);
  background:var(--gray-50);flex-wrap:wrap;
}
.opts-label{font-size:11px;color:var(--gray-400);margin-right:2px}
.chip{
  padding:3px 10px;border:1px solid var(--border);
  border-radius:100px;font-size:11px;
  color:var(--gray-500);cursor:pointer;
  background:var(--white);transition:all .15s;
  font-family:'Geist',sans-serif;
}
.chip:hover{border-color:var(--gray-400);color:var(--black)}
.chip.on{background:var(--black);color:white;border-color:var(--black)}
.run-row{padding:12px 16px;border-top:1px solid var(--border)}
.run-btn{
  width:100%;padding:10px;background:var(--black);color:white;
  border:none;border-radius:6px;
  font-family:'Geist',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:opacity .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.run-btn:hover{opacity:.85}
.run-btn:disabled{opacity:.45;cursor:not-allowed}
.spin{
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:white;
  animation:spin .6s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── FEATURES (like Ollama's model list) ─── */
.features{
  max-width:900px;margin:0 auto;
  padding:64px 24px;
}
.section-label{
  font-family:'Geist Mono',monospace;font-size:11px;
  color:var(--gray-400);text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:24px;
}
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
.feat-item{
  background:var(--white);padding:24px;
  transition:background .15s;cursor:default;
}
.feat-item:hover{background:var(--gray-50)}
.feat-tag{
  font-family:'Geist Mono',monospace;font-size:10px;
  color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:10px;
}
.feat-title{font-size:13px;font-weight:500;color:var(--black);margin-bottom:6px}
.feat-desc{font-size:12px;color:var(--gray-500);line-height:1.6}

/* ─── DIVIDER SECTION ─── */






/* ─── RESULT ─── */
#result-section{
  max-width:900px;margin:0 auto;
  padding:40px 24px 80px;
  display:none;
}
#result-section.on{display:block}
.result-topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.result-title{font-size:13px;font-weight:500;color:var(--black)}
.tag-row{display:flex;gap:6px;flex-wrap:wrap}
.tag{
  font-family:'Geist Mono',monospace;
  font-size:10px;padding:2px 8px;border-radius:4px;
  border:1px solid var(--border);color:var(--gray-500);
  background:var(--gray-50);
}

/* Accordion */
.acc{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.acc-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;
  transition:background .15s;
}
.acc-head:hover{background:var(--gray-50)}
.acc-head-left{display:flex;align-items:center;gap:10px}
.acc-n{
  font-family:'Geist Mono',monospace;font-size:10px;
  color:var(--gray-400);width:20px;text-align:center;
}
.acc-head h3{font-size:13px;font-weight:500;color:var(--black)}
.acc-arr{font-size:10px;color:var(--gray-400);transition:transform .2s}
.acc-arr.open{transform:rotate(180deg)}
.acc-body{
  max-height:0;overflow:hidden;
  border-top:0px solid var(--border);
  transition:max-height .3s ease,border-top-width .1s;
}
.acc-body.open{max-height:6000px;border-top-width:1px}
.acc-body-inner{padding:20px 18px}

/* Overview */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ov-cell{
  background:var(--gray-50);border:1px solid var(--border);
  border-radius:6px;padding:12px 14px;
}
.ov-label{font-size:10px;color:var(--gray-400);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.ov-value{font-size:12.5px;color:var(--black)}

/* Original */
.original{
  background:var(--gray-50);border:1px solid var(--border);
  border-radius:6px;padding:18px;
  font-family:'Geist Mono',monospace;font-size:12px;
  color:var(--gray-700);line-height:1.8;
  white-space:pre-wrap;word-break:break-word;
}

/* Sentences */
.para-h{
  font-family:'Geist Mono',monospace;font-size:10px;
  color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;
  margin:20px 0 10px;
}
.sent{
  border:1px solid var(--border);border-radius:8px;
  padding:16px 18px;margin-bottom:10px;
  background:var(--white);
}
.sent-idx{
  font-family:'Geist Mono',monospace;font-size:10px;
  color:var(--gray-400);margin-bottom:10px;
}
.sent-en{
  font-size:13.5px;color:var(--black);line-height:1.7;
  margin-bottom:12px;font-weight:400;
}
.sent-block{
  background:var(--gray-50);border:1px solid var(--border);
  border-radius:6px;padding:10px 14px;
  font-size:11.5px;color:var(--gray-700);
  margin-bottom:8px;line-height:1.7;
}
.sent-block-label{
  font-family:'Geist Mono',monospace;font-size:9px;
  color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:5px;
}
.vocab-tbl{width:100%;border-collapse:collapse;font-size:11.5px;margin-bottom:8px}
.vocab-tbl th{
  text-align:left;padding:6px 10px;
  color:var(--gray-400);font-size:10px;
  border-bottom:1px solid var(--border);font-weight:400;
  font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.04em;
}
.vocab-tbl td{
  padding:6px 10px;border-bottom:1px solid var(--gray-100);
  color:var(--gray-700);vertical-align:top;
}
.vocab-tbl td:first-child{
  font-family:'Geist Mono',monospace;
  font-size:11px;color:var(--black);font-weight:500;
}
.vocab-tbl td:nth-child(2){color:var(--gray-400);font-size:10.5px}
.trans-del{
  font-size:11px;color:var(--gray-400);
  text-decoration:line-through;margin-bottom:5px;
}
.trans-nat{
  font-size:12.5px;color:var(--black);
  border-left:2px solid var(--black);
  padding-left:12px;line-height:1.6;
}

/* Grammar */
.gram{
  border:1px solid var(--border);border-radius:8px;
  padding:16px 18px;margin-bottom:8px;
}
.gram h4{font-size:12.5px;font-weight:500;color:var(--black);margin-bottom:8px}
.gram-meta{display:flex;gap:6px;margin-bottom:8px}
.gram-meta span{
  font-size:10px;padding:2px 7px;border-radius:4px;
  border:1px solid var(--border);color:var(--gray-500);
  font-family:'Geist Mono',monospace;
}
.gram-ex{
  font-family:'Geist Mono',monospace;font-size:11px;
  color:var(--gray-700);background:var(--gray-50);
  border:1px solid var(--border);border-radius:5px;
  padding:8px 12px;margin-bottom:8px;line-height:1.7;
}
.gram-explain{font-size:12px;color:var(--gray-500);line-height:1.65}

/* Tips */
.tips-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.tip-card{
  border:1px solid var(--border);border-radius:8px;
  padding:16px;
}
.tip-card h4{font-size:11.5px;font-weight:500;color:var(--black);margin-bottom:10px}
.tip-card ul{list-style:none}
.tip-card li{
  font-size:11.5px;color:var(--gray-500);
  padding:4px 0;border-bottom:1px solid var(--gray-100);
  display:flex;gap:6px;line-height:1.5;
}
.tip-card li:last-child{border-bottom:none}
.tip-card li::before{content:'→';color:var(--gray-400);flex-shrink:0}

/* Error */
.err{
  background:var(--gray-50);border:1px solid var(--border);
  border-radius:8px;padding:14px 16px;
  font-size:12.5px;color:var(--gray-700);
  margin-bottom:16px;
}

/* Footer */
footer{
  border-top:1px solid var(--border);
  padding:24px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;
}
.footer-brand{
  display:flex;align-items:center;gap:6px;
  font-family:'Geist Mono',monospace;
  font-size:13px;font-weight:500;color:var(--black);
}
.footer-brand img{width:18px;height:18px;object-fit:contain}
footer p{font-size:11px;color:var(--gray-400)}

@media(max-width:600px){
  .feat-grid{grid-template-columns:1fr 1fr}
  .tips-grid{grid-template-columns:1fr}
  .ov-grid{grid-template-columns:1fr}
}
@media(max-width:400px){
  .feat-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <a class="nav-logo" href="#">
      <img id="nav-rabbit" src="" alt="ReadBunny" />
      ReadBunny
    </a>
    <div class="nav-links">
      <a href="#">功能</a>
      <a href="#">示例</a>
      <a href="#">文档</a>
    </div>
  </div>
  <div class="nav-right">
    <a href="#" class="btn-ghost">登录</a>
    <a href="#" class="btn-solid">开始使用</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    

    <!-- Rabbit image -->
    <div class="hero-image">
      <img id="hero-rabbit" src="" alt="ReadBunny" />
    </div>

    
    

    <!-- Input -->
    <div class="input-wrap">
      <div class="input-tabs">
        <button class="tab active" data-tab="text">粘贴文章</button>
        <button class="tab" data-tab="url">输入网址</button>
      </div>
      <div class="pane active" id="pane-text">
        <textarea id="article-text" placeholder="在此粘贴英文文章原文…"></textarea>
      </div>
      <div class="pane" id="pane-url">
        <div class="url-row">
          <input type="url" id="article-url" placeholder="https://example.com/article" />
        </div>
      </div>
      <div class="opts">
        <span class="opts-label">解析深度</span>
        <button class="chip" data-opt="overview">概览</button>
        <button class="chip on" data-opt="full">逐句精读</button>
        <button class="chip" data-opt="grammar">语法专项</button>
        <button class="chip" data-opt="vocab">词汇速记</button>
      </div>
      <div class="run-row">
        <button class="run-btn" id="run-btn">
          <div class="spin" id="btn-spin"></div>
          <span id="btn-txt">开始精读解析</span>
        </button>
      </div>
    </div>
  </div>
</section>



<!-- FEATURES -->
<section class="features">
  <div class="section-label">核心功能</div>
  <div class="feat-grid">
    <div class="feat-item">
      <div class="feat-tag">01</div>
      <div class="feat-title">逐句精读</div>
      <div class="feat-desc">每句话的主谓宾结构、句意分析和双版本翻译</div>
    </div>
    <div class="feat-item">
      <div class="feat-tag">02</div>
      <div class="feat-title">语法深析</div>
      <div class="feat-desc">识别核心语法点，配文章例句和详细用法解释</div>
    </div>
    <div class="feat-item">
      <div class="feat-tag">03</div>
      <div class="feat-title">词汇积累</div>
      <div class="feat-desc">重点词汇、同义词替换和实用搭配一览</div>
    </div>
    <div class="feat-item">
      <div class="feat-tag">04</div>
      <div class="feat-title">难度评估</div>
      <div class="feat-desc">自动判断文章难度等级和建议学习时长</div>
    </div>
    <div class="feat-item">
      <div class="feat-tag">05</div>
      <div class="feat-title">句型模仿</div>
      <div class="feat-desc">提取经典句型，提供改写建议和模仿示例</div>
    </div>
    <div class="feat-item">
      <div class="feat-tag">06</div>
      <div class="feat-title">URL 解析</div>
      <div class="feat-desc">直接输入文章链接，自动提取完整内容</div>
    </div>
  </div>
</section>

<!-- RESULT -->
<section id="result-section">
  <div id="err-box"></div>
  <div id="result-topbar-wrap"></div>
  <div id="result-body"></div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-brand">
    <img id="foot-rabbit" src="" alt="" />
    ReadBunny
  </div>
  <p>使用您自己的 API Key · 数据不上传至任何服务器</p>
</footer>

// ── API KEY prompt ──
let API_KEY = localStorage.getItem('rb_key') || '';

function getKey(){
  if(!API_KEY){
    API_KEY = prompt('请输入您的 Anthropic API Key（仅存于本地）：','');
    if(API_KEY) localStorage.setItem('rb_key',API_KEY);
  }
  return API_KEY;
}

// ── Run ──
document.getElementById('run-btn').addEventListener('click', run);

async function run(){
  const key = getKey();
  if(!key){ alert('需要 API Key 才能运行。'); return; }

  const tab = document.querySelector('.tab.active').dataset.tab;
  const mode = document.querySelector('.chip.on')?.dataset.opt || 'full';
  let content = '';

  if(tab==='text'){
    content = document.getElementById('article-text').value.trim();
    if(!content){ alert('请粘贴文章内容'); return; }
  } else {
    const url = document.getElementById('article-url').value.trim();
    if(!url){ alert('请输入网址'); return; }
    content = '请提取以下URL的文章内容并解析：' + url;
  }

  const btn = document.getElementById('run-btn');
  const spin = document.getElementById('btn-spin');
  const txt = document.getElementById('btn-txt');
  btn.disabled=true; spin.style.display='block'; txt.textContent='解析中…';
  document.getElementById('err-box').innerHTML='';
  document.getElementById('result-section').classList.add('on');
  document.getElementById('result-body').innerHTML=skeleton();
  document.getElementById('result-topbar-wrap').innerHTML='';

  const modeHints = {
    overview:'只填写 overview 字段，其余为空。',
    full:'完整填写所有字段。',
    grammar:'重点填写 grammar（至少5条），sentences 可简化。',
    vocab:'重点填写词汇相关字段。'
  };

  const sys = `你是资深英文语言学专家。请只输出如下格式的JSON，不要输出任何其他内容（包括markdown代码块）：
{"overview":{"topic":"","core":"","level":"","time":"","audience":""},"original":"","sentences":[{"para":1,"index":1,"en":"","subject":"","predicate":"","object":"","structures":[],"vocab":[{"word":"","pos":"","meaning":""}],"literal":"","natural":""}],"grammar":[{"name":"","frequency":"","example":"","explain":""}],"learning":{"vocab":[],"synonyms":[],"collocations":[],"patterns":[],"tips":[],"background":[]}}`;

  const prompt = `${modeHints[mode]}\n\n文章：\n${content}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01'
      },
      body:JSON.stringify({
        model:'claude-opus-4-5',
        max_tokens:8000,
        system:sys,
        messages:[{role:'user',content:prompt}]
      })
    });

    const data = await res.json();
    if(!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);

    let raw = data.content.map(i=>i.text||'').join('');
    raw = raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const s=raw.indexOf('{'), e=raw.lastIndexOf('}');
    if(s>-1) raw=raw.slice(s,e+1);
    const r = JSON.parse(raw);
    render(r);

  } catch(err){
    document.getElementById('result-body').innerHTML='';
    document.getElementById('err-box').innerHTML=`<div class="err">⚠️ ${esc(err.message)}</div>`;
  } finally {
    btn.disabled=false; spin.style.display='none'; txt.textContent='开始精读解析';
  }
}

function skeleton(){
  return `<div style="display:flex;flex-direction:column;gap:8px">
    ${[80,200,150,100].map(h=>`
    <div style="height:${h}px;background:linear-gradient(90deg,#f4f4f5 25%,#fafafa 50%,#f4f4f5 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;"></div>
    `).join('')}
  </div>
  <style>@keyframes shimmer{to{background-position:-200% 0}}</style>`;
}

function render(r){
  // topbar
  const lmap={'初级':'#16a34a','中级':'#ca8a04','高级':'#2563eb','专业级':'#7c3aed'};
  document.getElementById('result-topbar-wrap').innerHTML=`
    <div class="result-topbar">
      <span class="result-title">精读解析报告</span>
      <div class="tag-row">
        ${r.overview?.level?`<span class="tag" style="color:${lmap[r.overview.level]||'#71717a'};border-color:currentColor">${esc(r.overview.level)}</span>`:''}
        ${r.overview?.time?`<span class="tag">${esc(r.overview.time)}</span>`:''}
        ${r.overview?.topic?`<span class="tag">${esc(r.overview.topic)}</span>`:''}
      </div>
    </div>`;

  let html='';

  // 01 overview
  if(r.overview){
    html+=acc('01','文章概览',`
      <div class="ov-grid">
        ${ov('主题',r.overview.topic)}
        ${ov('难度',r.overview.level)}
        ${ov('学习时长',r.overview.time)}
        ${ov('目标读者',r.overview.audience)}
        <div class="ov-cell" style="grid-column:1/-1">${ov2('核心观点',r.overview.core)}</div>
      </div>`,true);
  }

  // 02 original
  if(r.original){
    html+=acc('02','原文内容',`<div class="original">${esc(r.original)}</div>`);
  }

  // 03 sentences
  if(r.sentences?.length){
    const paras={};
    r.sentences.forEach(s=>{const p=s.para||1;(paras[p]=paras[p]||[]).push(s)});
    let sh='';
    Object.entries(paras).forEach(([p,ss])=>{
      sh+=`<div class="para-h">第 ${p} 段</div>`;
      ss.forEach(s=>{
        const vocR=(s.vocab||[]).map(v=>
          `<tr><td>${esc(v.word)}</td><td>${esc(v.pos)}</td><td>${esc(v.meaning)}</td></tr>`
        ).join('');
        sh+=`<div class="sent">
          <div class="sent-idx">句 ${s.index||''}</div>
          <div class="sent-en">${esc(s.en||'')}</div>
          ${s.subject?`<div class="sent-block"><div class="sent-block-label">主谓宾</div>"${esc(s.subject)}" + "${esc(s.predicate)}"${s.object?` + "${esc(s.object)}"`:''}
          </div>`:''}
          ${(s.structures||[]).length?`<div class="sent-block"><div class="sent-block-label">句意结构</div>${(s.structures||[]).map((x,i)=>`<div>${i+1}. ${esc(x)}</div>`).join('')}</div>`:''}
          ${vocR?`<table class="vocab-tbl"><tr><th>单词</th><th>词性</th><th>释义</th></tr>${vocR}</table>`:''}
          ${s.literal?`<div class="trans-del">${esc(s.literal)}</div>`:''}
          ${s.natural?`<div class="trans-nat">${esc(s.natural)}</div>`:''}
        </div>`;
      });
    });
    html+=acc('03','逐句精读解析',sh,true);
  }

  // 04 grammar
  if(r.grammar?.length){
    const gh=r.grammar.map(g=>`
      <div class="gram">
        <h4>${esc(g.name||'')}</h4>
        <div class="gram-meta">${g.frequency?`<span>${esc(g.frequency)}</span>`:''}</div>
        ${g.example?`<div class="gram-ex">${esc(g.example)}</div>`:''}
        ${g.explain?`<div class="gram-explain">${esc(g.explain)}</div>`:''}
      </div>`).join('');
    html+=acc('04','语法重点',gh);
  }

  // 05 learning
  if(r.learning){
    const L=r.learning;
    html+=acc('05','学习建议',`
      <div class="tips-grid">
        <div class="tip-card"><h4>词汇积累</h4><ul>
          ${[...(L.vocab||[]),...(L.synonyms||[]),...(L.collocations||[])].map(v=>`<li>${esc(v)}</li>`).join('')}
        </ul></div>
        <div class="tip-card"><h4>句型模仿</h4><ul>
          ${(L.patterns||[]).map(v=>`<li>${esc(v)}</li>`).join('')}
        </ul></div>
        <div class="tip-card"><h4>阅读技巧</h4><ul>
          ${[...(L.tips||[]),...(L.background||[])].map(v=>`<li>${esc(v)}</li>`).join('')}
        </ul></div>
      </div>`);
  }

  document.getElementById('result-body').innerHTML=html;
  document.getElementById('result-section').scrollIntoView({behavior:'smooth',block:'start'});
  setTimeout(initAcc,30);
}

function acc(n,title,body,open=false){
  return `<div class="acc">
    <div class="acc-head ${open?'':''}">
      <div class="acc-head-left">
        <span class="acc-n">${n}</span>
        <h3>${title}</h3>
      </div>
      <span class="acc-arr ${open?'open':''}">▾</span>
    </div>
    <div class="acc-body ${open?'open':''}">
      <div class="acc-body-inner">${body}</div>
    </div>
  </div>`;
}

function ov(label,value){
  return `<div class="ov-cell"><div class="ov-label">${label}</div><div class="ov-value">${esc(value||'—')}</div></div>`;
}
function ov2(label,value){
  return `<div class="ov-label">${label}</div><div class="ov-value">${esc(value||'—')}</div>`;
}

function initAcc(){
  document.querySelectorAll('.acc-head').forEach(h=>{
    if(h._init) return; h._init=true;
    h.addEventListener('click',()=>{
      const body=h.nextElementSibling;
      const arr=h.querySelector('.acc-arr');
      body.classList.toggle('open');
      arr.classList.toggle('open');
    });
  });
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
